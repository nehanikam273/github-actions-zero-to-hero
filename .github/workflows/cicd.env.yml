# This is the name of the workflow that will be displayed in the Actions Tab
name: CICD

#Manual click (deliver ) workflow whenever user needs
on:
  workflow_dispatch:
    inputs:
      environment:
        description: This is the environment where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

  
   jobs:
    code:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Verify Checkout
          run: echo "Code checked out successfully"

    build:
      needs: code
      runs-on: ubuntu-latest

      steps:
        - name: Build Docker Container
          run: echo "Docker Container Built"

    test:
      needs: build
      runs-on: ubuntu-latest

      steps:
        - name: Test the Container
          run: echo "Testing the container"

    deploy:
      needs: test
      runs-on: ubuntu-latest

      steps:
        - name: Deploy the App
          run: echo "Docker Compose deployed the app"       
